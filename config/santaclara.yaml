format_version: 1

###################
## Model options
model_params:
  model_architecture: "arch_acmf"

  input_dims: 5
  spatial_shape:
     - 340
     - 337
     - 213
  scale_list:
    - 2
    - 4
    - 8
    - 16

  hiden_size: 64
  num_classes: 5
  backbone_2d: FastSCNN
  pretrained2d: False

  fusion_type: "acmf_cmf4"


###################
## Dataset options
dataset_params:
  training_size: 8563
  dataset_type: "point_image_dataset_wcs2d3d_cachedgeom"
  Wandb_Project: "GAUFNet_SantaClara_IKDNet"
  pc_dataset_type: "SantaClara"
  collate_type: "collate_fn_default"
  ignore_label: 0

  label_mapping: "config/label_mapping/santaclara_ikdnet.yaml"

  preprocessed_data:
    enabled: true
    path: "/202321633099/zhangjun/N3C-California_npz"


  precomputed_geometry:
    enabled: true
    path: ""

  image_data_path: ""
  image_suffix: "_img.tif"

  bottom_crop:
    - 384
    - 384
  max_img_pts: 100000
  color_jitter:
    - 0.4
    - 0.4
    - 0.4
  flip2d: 0.5
  image_normalizer:
    - [0.485, 0.456, 0.406]
    - [0.229, 0.224, 0.225]

  max_volume_space:
    - 819
    - 872
    - 518
  min_volume_space:
    - -881
    - -811
    - -544

  seg_labelweights:
    - 0
    - 284978998
    - 945823397
    - 1407893955
    - 345285641

  train_data_loader:
    data_path: ""
    batch_size: 4
    shuffle: True
    num_workers: 4
    rotate_aug: True
    flip_aug: True
    scale_aug: True
    transform_aug: True
    dropout_aug: True

  val_data_loader:
    data_path: ""
    shuffle: False
    num_workers: 4
    batch_size: 4
    rotate_aug: False
    flip_aug: False
    scale_aug: False
    transform_aug: False
    dropout_aug: False

###################
## Train params
train_params:
  max_num_epochs: 200
  learning_rate: 0.18
  optimizer: SGD
  lr_scheduler: CosineAnnealingWarmRestarts
  momentum: 0.9
  nesterov: True
  weight_decay: 1.0e-4

  lambda_seg2d: 1
  lambda_xm: 0.05
  lambda_lovasz: 0.1

  debug_profile:
    enabled: false
    interval: 1

  puaf_vis:
    enabled: false
